services:
  postgres:
    image: postgres:16
    container_name: shifthub_postgres
    environment:
      POSTGRES_DB: shifthub
      POSTGRES_USER: shifthub_user
      POSTGRES_PASSWORD: shifthub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shifthub_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
